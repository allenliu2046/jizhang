<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>记账 · 宣传视频渲染器</title>
  <style>
    body { margin: 0; background: #17191D; display: flex; flex-direction: column; align-items: center; font-family: -apple-system, "PingFang SC", sans-serif; }
    canvas { width: 405px; height: 720px; margin-top: 12px; box-shadow: 0 6px 30px rgba(0, 0, 0, 0.6); }
    #hud { color: #cfd6dd; font-size: 13px; padding: 10px 0; }
  </style>
</head>
<body>
  <canvas id="cv" width="1080" height="1920"></canvas>
  <div id="hud">加载中…</div>
<script>
'use strict';

/* ================= 基础 =================
   Apple 广告风：深空黑、巨大极简文案、光泽扫过、缓慢克制的运镜 */
const W = 1080, H = 1920, FPS = 30, DUR = 34.0, TOTAL = DUR * FPS;
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const hud = document.getElementById('hud');

const COL = {
  // 应用内屏幕仍是浅色主题（黑暗里发光的屏幕）
  bg: '#F5F6F8', card: '#FFFFFF', text: '#17202A', sub: '#8A94A3',
  accent: '#10B981', deep: '#059669', soft: 'rgba(16,185,129,0.12)',
  keyPress: '#E8EBEF', barMuted: '#D7DCE3',
  // 片场
  space: '#050607', white: '#F5F7FA', grey: '#9AA2AB', greyDim: '#6B7480',
  glow: '#34D399'
};
const FONT = '-apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif';
const font = (w, s) => w + ' ' + s + 'px ' + FONT;

const clamp01 = x => Math.max(0, Math.min(1, x));
const seg = (t, a, b) => clamp01((t - a) / (b - a));
const lerp = (a, b, p) => a + (b - a) * p;
const quint = p => 1 - Math.pow(1 - p, 5);
const easeOut = p => 1 - Math.pow(1 - p, 3);
const easeInOut = p => p < 0.5 ? 4 * p * p * p : 1 - Math.pow(-2 * p + 2, 3) / 2;

function rr(x, y, w, h, r) { ctx.beginPath(); ctx.roundRect(x, y, w, h, r); }

function measure(str, weight, size) { ctx.font = font(weight || 400, size || 40); return ctx.measureText(str).width; }

function text(str, x, y, o = {}) {
  ctx.save();
  ctx.globalAlpha *= (o.alpha == null ? 1 : o.alpha);
  ctx.fillStyle = o.color || COL.white;
  ctx.font = font(o.weight || 400, o.size || 40);
  ctx.textAlign = o.align || 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.letterSpacing = (o.ls || 0) + 'px';
  if (o.glow) { ctx.shadowColor = o.glow; ctx.shadowBlur = o.glowBlur || 46; }
  ctx.fillText(str, x, y);
  ctx.letterSpacing = '0px';
  ctx.restore();
}

// 一行内混排不同颜色/字号，整体居中；返回各段位置
function segLine(segs, cx, y, o = {}) {
  const bw = o.weight || 400, bs = o.size || 40;
  let total = 0;
  for (const g of segs) total += measure(g.t, g.weight || bw, g.size || bs);
  let x = cx - total / 2;
  const pos = [];
  ctx.save();
  ctx.globalAlpha *= (o.alpha == null ? 1 : o.alpha);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  for (const g of segs) {
    ctx.font = font(g.weight || bw, g.size || bs);
    ctx.fillStyle = g.color || o.color || COL.white;
    if (g.glow) { ctx.shadowColor = g.glow; ctx.shadowBlur = 50; } else { ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; }
    const w = ctx.measureText(g.t).width;
    ctx.fillText(g.t, x, y);
    pos.push({ x, w });
    x += w;
  }
  ctx.restore();
  return pos;
}

// 大字上的光泽扫过（Apple 招牌）：离屏画字，再用移动的高光渐变叠在字形内
const off = document.createElement('canvas');
off.width = W; off.height = H;
const octx = off.getContext('2d');
function sweepText(str, x, y, o, sweepP) {
  octx.clearRect(0, 0, W, H);
  octx.font = font(o.weight || 600, o.size || 120);
  octx.textAlign = 'center';
  octx.textBaseline = 'alphabetic';
  octx.letterSpacing = (o.ls || 0) + 'px';
  octx.fillStyle = o.color || COL.white;
  octx.fillText(str, x, y);
  octx.letterSpacing = '0px';
  if (sweepP != null && sweepP > 0 && sweepP < 1) {
    const sw = W * 0.45, sx = lerp(-sw, W, sweepP);
    const g = octx.createLinearGradient(sx, 0, sx + sw, 0);
    g.addColorStop(0, 'rgba(255,255,255,0)');
    g.addColorStop(0.5, 'rgba(255,255,255,0.85)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    octx.globalCompositeOperation = 'source-atop';
    octx.fillStyle = g;
    octx.fillRect(0, 0, W, H);
    octx.globalCompositeOperation = 'source-over';
  }
  ctx.save();
  ctx.globalAlpha *= (o.alpha == null ? 1 : o.alpha);
  if (o.glow) { ctx.shadowColor = o.glow; ctx.shadowBlur = 60; }
  ctx.drawImage(off, 0, 0);
  ctx.restore();
}

function vignette(a) {
  const g = ctx.createRadialGradient(W / 2, H / 2, H * 0.32, W / 2, H / 2, H * 0.72);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, 'rgba(0,0,0,' + a + ')');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// 深空底 + 缓慢游移的环境光斑
function space(t) {
  ctx.fillStyle = COL.space;
  ctx.fillRect(0, 0, W, H);
  const x1 = W * 0.32 + Math.sin(t * 0.12) * 70, y1 = H * 0.24 + Math.cos(t * 0.09) * 50;
  let g = ctx.createRadialGradient(x1, y1, 0, x1, y1, 760);
  g.addColorStop(0, 'rgba(16,185,129,0.085)');
  g.addColorStop(1, 'rgba(16,185,129,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  const x2 = W * 0.74 + Math.cos(t * 0.08) * 60, y2 = H * 0.78 + Math.sin(t * 0.11) * 50;
  g = ctx.createRadialGradient(x2, y2, 0, x2, y2, 700);
  g.addColorStop(0, 'rgba(80,130,255,0.05)');
  g.addColorStop(1, 'rgba(80,130,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

/* ================= 素材 ================= */
const iconImg = new Image(); iconImg.src = '/icons/icon-192.png';
const qrImg = new Image(); qrImg.src = '/tools/promo/qr.png';
let iconOk = false, qrOk = false;

/* ================= 场景 1：字段词云（0 – 8s） ================= */
function mulberry32(a) {
  return function () {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const WORDS = ['账户', '分类', '子分类', '标签', '成员', '商家', '门店', '币种', '报销', '优惠券', '项目', '时间', '地点', '备注', '小票', '预算', '周期', '汇率', '模板', '标签组'];
const cloud = [];
{
  // 打乱的 4×5 网格 + 抖动：散布自然且不会整词重叠
  const rnd = mulberry32(11);
  const cells = [];
  for (let r = 0; r < 5; r++) for (let c = 0; c < 4; c++) cells.push([c, r]);
  for (let i = cells.length - 1; i > 0; i--) {
    const j = Math.floor(rnd() * (i + 1));
    [cells[i], cells[j]] = [cells[j], cells[i]];
  }
  let wt = 0.8, iv = 0.34;
  for (let i = 0; i < WORDS.length; i++) {
    const [c, r] = cells[i];
    const base = 46 + rnd() * 46;
    cloud.push({
      w: WORDS[i], at: wt,
      x: 200 + c * 226 + (rnd() - 0.5) * 100,
      y: 320 + r * 258 + (rnd() - 0.5) * 130,
      size: base * (WORDS[i].length <= 2 ? 1 : WORDS[i].length === 3 ? 0.8 : 0.68),
      a: 0.3 + rnd() * 0.45,
      rot: (rnd() - 0.5) * 0.1
    });
    wt += iv; iv = Math.max(0.12, iv * 0.92);
  }
}

function sceneCloud(t) {
  ctx.fillStyle = COL.space;
  ctx.fillRect(0, 0, W, H);
  const zoom = 1 + 0.06 * seg(t, 0.8, 5.4);          // 缓慢推近，压迫感
  const exit = seg(t, 5.35, 6.05);                     // 溃散
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(zoom, zoom);
  ctx.translate(-W / 2, -H / 2);
  if (exit > 0.02) ctx.filter = 'blur(' + (exit * 10).toFixed(1) + 'px)';
  for (const c of cloud) {
    const p = easeOut(seg(t, c.at, c.at + 0.35));
    if (p <= 0) continue;
    const drift = (t - c.at) * 9;
    ctx.save();
    ctx.translate(c.x, c.y - drift);
    ctx.rotate(c.rot);
    ctx.scale(lerp(1.08, 1, p) * (1 + exit * 0.15), lerp(1.08, 1, p) * (1 + exit * 0.15));
    text(c.w, 0, 0, { size: c.size, weight: 500, color: '#8E96A0', alpha: p * c.a * (1 - exit) });
    ctx.restore();
  }
  ctx.restore();
  // 陈述
  const s1 = quint(seg(t, 6.2, 7.0));
  if (s1 > 0) text('记一笔账，', W / 2, 890 + (1 - s1) * 46, { size: 82, weight: 500, color: COL.grey, alpha: s1 });
  const s2 = quint(seg(t, 6.55, 7.35));
  if (s2 > 0) text('不该这么复杂。', W / 2, 1024 + (1 - s2) * 46, { size: 88, weight: 650, alpha: s2, ls: 2 });
  vignette(0.5);
}

/* ================= 场景 2：陈述卡「只要两秒。」（8 – 12s） ================= */
function sceneClaim(t) {
  const rel = t - 8;
  ctx.fillStyle = COL.space;
  ctx.fillRect(0, 0, W, H);
  const p = quint(seg(rel, 0.25, 1.05));
  if (p > 0) {
    const sweepP = seg(rel, 1.0, 2.3);
    ctx.save();
    ctx.globalAlpha = p;
    sweepText('只要两秒。', W / 2, 972 + (1 - p) * 40, { size: 132, weight: 600, ls: 6, glow: 'rgba(245,247,250,0.18)' }, sweepP);
    ctx.restore();
  }
  const p2 = quint(seg(rel, 1.1, 1.8));
  if (p2 > 0) text('从打开，到记完。', W / 2, 1104, { size: 44, weight: 400, color: COL.greyDim, alpha: p2, ls: 4 });
  vignette(0.45);
}

/* ================= 手机样机（暗夜悬浮主角） ================= */
const PH = { x: 125, y: 110, w: 830, h: 1700, r: 112 };
const SC = { x: 143, y: 128, w: 794, h: 1664, r: 94 };
const TABS_H = 116, COMMIT_H = 126, KEY_H = 120, KEY_GAP = 20, PAD_X = 28;
const COMMIT_Y = SC.y + SC.h - TABS_H - 24 - COMMIT_H;
const GRID_TOP = COMMIT_Y - 4 * (KEY_H + KEY_GAP);
const KEY_W = (SC.w - PAD_X * 2 - KEY_GAP * 2) / 3;
const KEY_POS = { '1': [0, 0], '2': [0, 1], '3': [0, 2], '4': [1, 0], '5': [1, 1], '6': [1, 2], '7': [2, 0], '8': [2, 1], '9': [2, 2], '.': [3, 0], '0': [3, 1], 'del': [3, 2] };

function keyRect(k) {
  const [r, c] = KEY_POS[k];
  return { x: SC.x + PAD_X + c * (KEY_W + KEY_GAP), y: GRID_TOP + r * (KEY_H + KEY_GAP), w: KEY_W, h: KEY_H };
}

function drawPhoneShell() {
  // 底部光晕：屏幕的光洒在“地面”
  const g = ctx.createRadialGradient(W / 2, PH.y + PH.h + 30, 0, W / 2, PH.y + PH.h + 30, 480);
  g.addColorStop(0, 'rgba(120,200,170,0.10)');
  g.addColorStop(1, 'rgba(120,200,170,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, PH.y + PH.h - 200, W, 600);
  // 机身
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.65)';
  ctx.shadowBlur = 90;
  ctx.shadowOffsetY = 36;
  rr(PH.x, PH.y, PH.w, PH.h, PH.r);
  ctx.fillStyle = '#131518'; ctx.fill();
  ctx.restore();
  // 轮廓光：顶部一圈冷白 rim light
  const rim = ctx.createLinearGradient(0, PH.y, 0, PH.y + PH.h);
  rim.addColorStop(0, 'rgba(255,255,255,0.30)');
  rim.addColorStop(0.25, 'rgba(255,255,255,0.06)');
  rim.addColorStop(0.8, 'rgba(255,255,255,0.02)');
  rim.addColorStop(1, 'rgba(255,255,255,0.12)');
  ctx.save();
  ctx.lineWidth = 3;
  ctx.strokeStyle = rim;
  rr(PH.x + 1.5, PH.y + 1.5, PH.w - 3, PH.h - 3, PH.r);
  ctx.stroke();
  ctx.restore();
  // 屏幕（黑暗中发光）
  ctx.save();
  ctx.shadowColor = 'rgba(235,245,250,0.10)';
  ctx.shadowBlur = 80;
  rr(SC.x, SC.y, SC.w, SC.h, SC.r);
  ctx.fillStyle = COL.bg; ctx.fill();
  ctx.restore();
}

function drawNotch() {
  rr(W / 2 - 88, SC.y + 16, 176, 36, 18);
  ctx.fillStyle = 'rgba(11,13,16,0.95)'; ctx.fill();
}

// 记账页（应用主界面的重绘，浅色）
function drawEntryScreen(st) {
  ctx.fillStyle = COL.bg;
  ctx.fillRect(SC.x, SC.y, SC.w, SC.h);

  ctx.save();
  ctx.translate(W / 2, SC.y + 170);
  const hs = 1 + 0.18 * (st.headPop || 0);
  ctx.scale(hs, hs);
  segLine([
    { t: '今日已花 ', color: COL.sub, size: 34 },
    { t: st.headMoney, color: COL.text, size: 37, weight: 650 },
    { t: ' · ' + st.headCount + ' 笔', color: COL.sub, size: 34 }
  ], 0, 0, {});
  ctx.restore();

  ctx.save();
  ctx.translate(W / 2, SC.y + 560);
  const as = 1 + 0.14 * (st.amountPop || 0);
  ctx.scale(as, as);
  const dim = st.amountStr === '0';
  segLine([
    { t: '¥ ', color: COL.sub, size: 64, weight: 300 },
    { t: st.amountStr, color: dim ? COL.sub : COL.text, size: 136, weight: 300 }
  ], 0, 0, { alpha: dim ? 0.5 : 1 });
  ctx.restore();

  for (const k of Object.keys(KEY_POS)) {
    const kr = keyRect(k);
    const pr = (st.pressed && st.pressed.key === k) ? st.pressed.p : 0;
    ctx.save();
    ctx.translate(kr.x + kr.w / 2, kr.y + kr.h / 2);
    ctx.scale(1 - 0.05 * pr, 1 - 0.05 * pr);
    rr(-kr.w / 2, -kr.h / 2, kr.w, kr.h, 30);
    ctx.fillStyle = pr > 0 ? COL.keyPress : COL.card;
    ctx.fill();
    if (k === 'del') text('⌫', 0, 16, { size: 44, color: COL.sub });
    else text(k, 0, 19, { size: 54, weight: 500, color: COL.text });
    ctx.restore();
  }

  const gr = { x: SC.x + PAD_X, y: COMMIT_Y, w: SC.w - PAD_X * 2, h: COMMIT_H };
  const gp = (st.pressed && st.pressed.key === 'go') ? st.pressed.p : 0;
  ctx.save();
  ctx.translate(gr.x + gr.w / 2, gr.y + gr.h / 2);
  ctx.scale(1 - 0.03 * gp, 1 - 0.03 * gp);
  rr(-gr.w / 2, -gr.h / 2, gr.w, gr.h, 30);
  ctx.fillStyle = COL.deep; ctx.fill();
  if (st.btnFlash > 0) { rr(-gr.w / 2, -gr.h / 2, gr.w, gr.h, 30); ctx.fillStyle = 'rgba(255,255,255,' + 0.3 * st.btnFlash + ')'; ctx.fill(); }
  text('记 一 笔', 0, 16, { size: 44, weight: 600, color: '#fff', ls: 6 });
  ctx.restore();

  drawTabbar(0);

  if (st.toastA > 0) {
    const label = '已记入 ¥25.5';
    const tw = measure(label, 500, 34) + 72;
    const ty = SC.y + SC.h - 400 + (1 - st.toastIn) * 30;
    ctx.save();
    ctx.globalAlpha = st.toastA;
    rr(W / 2 - tw / 2, ty, tw, 84, 42);
    ctx.fillStyle = 'rgba(23,32,42,0.92)'; ctx.fill();
    text(label, W / 2, ty + 55, { size: 34, weight: 500, color: '#F5F6F8' });
    ctx.restore();
  }
}

function drawTabbar(active) {
  const ty = SC.y + SC.h - TABS_H;
  ctx.fillStyle = 'rgba(23,32,42,0.08)';
  ctx.fillRect(SC.x, ty, SC.w, 2);
  ['记账', '统计', '明细'].forEach((s, i) => {
    const x = SC.x + SC.w * (1 + 2 * i) / 6;
    text(s, x, ty + 72, { size: 30, weight: i === active ? 650 : 400, color: i === active ? COL.deep : COL.sub });
  });
}

/* ================= 场景 3：演示（12 – 18s） ================= */
const TAPS = [
  { key: '2', at: 2.5 }, { key: '5', at: 3.0 }, { key: '.', at: 3.5 },
  { key: '5', at: 4.0 }, { key: 'go', at: 4.6 }
];

function demoState(rel) {
  const st = { headMoney: '¥38', headCount: 3, amountStr: '0', headPop: 0, amountPop: 0, pressed: null, btnFlash: 0, toastA: 0, toastIn: 1 };
  let s = '', lastChange = -9;
  for (const tp of TAPS) {
    if (rel < tp.at) continue;
    if (tp.key === 'go') { s = ''; } else s += tp.key;
    lastChange = tp.at;
    const pr = 1 - seg(rel, tp.at + 0.03, tp.at + 0.2);
    if (pr > 0) st.pressed = { key: tp.key, p: pr };
  }
  st.amountStr = s === '' ? '0' : s;
  st.amountPop = lastChange > 0 ? 1 - seg(rel, lastChange, lastChange + 0.2) : 0;
  if (rel >= 4.6) {
    st.headMoney = '¥63.5'; st.headCount = 4;
    st.headPop = 1 - seg(rel, 4.65, 4.92);
    st.btnFlash = 1 - seg(rel, 4.6, 4.92);
    st.toastIn = easeOut(seg(rel, 4.72, 4.98));
    st.toastA = st.toastIn * (1 - seg(rel, 5.6, 5.9));
  }
  return st;
}

// 手机场景通用：入场 + 极缓推近
function phoneDrift(rel, inDur, zoomSpan) {
  const p = quint(seg(rel, 0, inDur));
  const s = lerp(0.955, 0.99, seg(rel, 0, zoomSpan));
  ctx.translate(W / 2, H / 2);
  ctx.scale(s, s);
  ctx.translate(-W / 2, -H / 2);
  ctx.translate(0, (1 - p) * 240);
  ctx.globalAlpha = Math.min(1, seg(rel, 0, inDur * 0.7));
}

function sceneDemo(t) {
  const rel = t - 12;
  space(t);
  ctx.save();
  phoneDrift(rel, 1.2, 6);
  drawPhoneShell();
  ctx.save();
  rr(SC.x, SC.y, SC.w, SC.h, SC.r); ctx.clip();
  drawEntryScreen(demoState(rel));
  ctx.restore();
  drawNotch();

  // 指尖圆点
  for (const tp of TAPS) {
    const a = seg(rel, tp.at - 0.22, tp.at) * (1 - seg(rel, tp.at + 0.12, tp.at + 0.36));
    if (a <= 0) continue;
    const kr = tp.key === 'go'
      ? { x: SC.x + PAD_X, y: COMMIT_Y, w: SC.w - PAD_X * 2, h: COMMIT_H }
      : keyRect(tp.key);
    const cx = kr.x + kr.w / 2, cyy = kr.y + kr.h / 2;
    const sc = lerp(1.45, 1, easeOut(seg(rel, tp.at - 0.22, tp.at + 0.02)));
    ctx.save();
    ctx.globalAlpha = a * 0.5;
    ctx.beginPath(); ctx.arc(cx, cyy, 44 * sc, 0, Math.PI * 2);
    ctx.fillStyle = '#28323E'; ctx.fill();
    ctx.globalAlpha = a * 0.85;
    ctx.lineWidth = 5;
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath(); ctx.arc(cx, cyy, 44 * sc, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }
  ctx.restore();

  // 秒表：磨砂极简
  const chipA = quint(seg(rel, 2.0, 2.35));
  if (chipA > 0) {
    const sw = clamp01((rel - 2.5) / 2.1) * 2.1;
    const frozen = rel >= 4.6;
    const pulse = frozen ? 1 + 0.12 * (1 - seg(rel, 4.6, 4.88)) : 1;
    const cw = 240, chh = 92, cx = W - 64 - cw / 2, cyy = 168 + chh / 2;
    ctx.save();
    ctx.globalAlpha = chipA;
    ctx.translate(cx, cyy);
    ctx.scale(pulse, pulse);
    rr(-cw / 2, -chh / 2, cw, chh, chh / 2);
    ctx.fillStyle = frozen ? 'rgba(5,150,105,0.92)' : 'rgba(12,17,23,0.82)';
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = frozen ? 'rgba(52,211,153,0.6)' : 'rgba(255,255,255,0.22)';
    rr(-cw / 2 + 1, -chh / 2 + 1, cw - 2, chh - 2, chh / 2);
    ctx.stroke();
    ctx.beginPath(); ctx.arc(-cw / 2 + 50, 0, 10, 0, Math.PI * 2);
    ctx.fillStyle = frozen ? '#B8F5DC' : 'rgba(255,255,255,0.6)'; ctx.fill();
    text(sw.toFixed(1) + ' s', 20, 15, { size: 44, weight: 500, color: COL.white });
    ctx.restore();
  }
  vignette(0.4);
}

/* ================= 场景 4：陈述卡「2.1 秒。」（18 – 21s） ================= */
function sceneTime(t) {
  const rel = t - 18;
  ctx.fillStyle = COL.space;

/* ================= 配乐（Apple 风氛围乐，OfflineAudioContext 合成） =================
   A 大调。结构：暗涌铺垫 → 8.3s 和弦绽放 → 12s 心跳脉冲入 → 16.6s 记完冲击
   → 21s 琶音 → 27.6s 终止和弦 → 混响尾音收黑 */
const NOTE = { A1: 55, A2: 110, E3: 164.81, F$3: 185, A3: 220, C4: 261.63, C$4: 277.18, E4: 329.63, F$4: 369.99, A4: 440, B4: 493.88, C$5: 554.37, E5: 659.25, A5: 880 };

function makeIR(ac, dur, decay) {
  const sr = ac.sampleRate, len = Math.floor(sr * dur);
  const buf = ac.createBuffer(2, len, sr);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
  }
  return buf;
}

async function renderAudio() {
  const sr = 44100;
  const ac = new OfflineAudioContext(2, Math.ceil(DUR * sr), sr);
  const master = ac.createGain(); master.gain.value = 0.9;
  const comp = ac.createDynamicsCompressor();
  comp.threshold.value = -20; comp.ratio.value = 3; comp.attack.value = 0.01; comp.release.value = 0.3;
  master.connect(comp); comp.connect(ac.destination);
  const verb = ac.createConvolver(); verb.buffer = makeIR(ac, 3.2, 2.4);
  const verbGain = ac.createGain(); verbGain.gain.value = 0.4;
  verb.connect(verbGain); verbGain.connect(master);

  const out = (g, wet) => { g.connect(master); if (wet > 0) { const s = ac.createGain(); s.gain.value = wet; g.connect(s); s.connect(verb); } };

  // 长音铺底（正弦，慢起慢收）
  const drone = (t0, dur, freq, peak, atk, rel) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(Math.max(peak, 0.0002), t0 + atk);
    g.gain.setValueAtTime(Math.max(peak, 0.0002), t0 + dur - rel);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); out(g, 0.25);
    o.start(t0); o.stop(t0 + dur + 0.1);
  };
  // 温暖 pad：双三角波微失谐 + 低通
  const pad = (t0, dur, freq, peak, atk, rel, lp) => {
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(Math.max(peak, 0.0002), t0 + atk);
    g.gain.setValueAtTime(Math.max(peak, 0.0002), t0 + dur - rel);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    const f = ac.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lp || 1400; f.Q.value = 0.4;
    f.connect(g); out(g, 0.6);
    for (const det of [-4, 4]) {
      const o = ac.createOscillator();
      o.type = 'triangle'; o.frequency.value = freq; o.detune.value = det;
      o.connect(f); o.start(t0); o.stop(t0 + dur + 0.1);
    }
  };
  // 心跳脉冲（软底鼓）
  const pulse = (t0, gain) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(110, t0);
    o.frequency.exponentialRampToValueAtTime(42, t0 + 0.09);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.28);
    o.connect(g); out(g, 0.12);
    o.start(t0); o.stop(t0 + 0.4);
  };
  // 拨弦（琶音用）
  const pluck = (t0, freq, gain) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'triangle'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.6);
    o.connect(g); out(g, 0.7);
    o.start(t0); o.stop(t0 + 0.8);
  };
  // 低频冲击 + 空气感
  const impact = (t0, gain) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(72, t0);
    o.frequency.exponentialRampToValueAtTime(38, t0 + 0.5);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.9);
    o.connect(g); out(g, 0.3);
    o.start(t0); o.stop(t0 + 1);
    const len = Math.floor(sr * 0.18), nb = ac.createBuffer(1, len, sr);
    const d = nb.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = ac.createBufferSource(); src.buffer = nb;
    const f = ac.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 900;
    const ng = ac.createGain(); ng.gain.value = gain * 0.5;
    src.connect(f); f.connect(ng); out(ng, 0.5);
    src.start(t0);
  };
  // 上升的气流（riser）
  const riser = (t0, dur, gain) => {
    const len = Math.floor(sr * dur), nb = ac.createBuffer(1, len, sr);
    const d = nb.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (i / len);
    const src = ac.createBufferSource(); src.buffer = nb;
    const f = ac.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = 1.4;
    f.frequency.setValueAtTime(320, t0);
    f.frequency.exponentialRampToValueAtTime(2600, t0 + dur);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + dur * 0.85);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur + 0.15);
    src.connect(f); f.connect(g); out(g, 0.5);
    src.start(t0);
  };
  // 键盘轻嗒（UI 音，几乎不进混响）
  const tick = (t0) => {
    for (const [fr, gn, du] of [[1750, 0.11, 0.05], [3500, 0.04, 0.03]]) {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'sine'; o.frequency.value = fr;
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(gn, t0 + 0.004);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + du);
      o.connect(g); out(g, 0.08);
      o.start(t0); o.stop(t0 + du + 0.05);
    }
  };

  /* —— 编曲 —— */
  // 0–12s 暗涌：低频铺底贯穿全片
  drone(0, 33.5, NOTE.A1, 0.055, 4, 3);
  drone(0.5, 11, NOTE.A2, 0.03, 3, 2);
  // 词云段的小调色彩（A + C 自然音，微暗）
  pad(1.2, 6.6, NOTE.A3, 0.028, 2.5, 1.5, 700);
  pad(2.2, 5.6, NOTE.C4, 0.02, 2.5, 1.5, 600);
  // riser 推向陈述卡
  riser(6.6, 1.6, 0.05);
  // 8.3s「只要两秒。」：大三和弦绽放
  impact(8.3, 0.13);
  pad(8.3, 4.2, NOTE.A2, 0.05, 0.6, 1.6, 1600);
  pad(8.3, 4.2, NOTE.C$4, 0.038, 0.8, 1.6, 1800);
  pad(8.35, 4.2, NOTE.E4, 0.034, 1.0, 1.6, 1800);
  pluck(9.0, NOTE.A4, 0.045);
  pluck(9.6, NOTE.E5, 0.032);
  // 12s 演示：心跳脉冲入场，逐渐清晰
  for (let i = 0; i < 12; i++) pulse(12 + i * 0.75, 0.055 + i * 0.0022);
  pad(12, 6, NOTE.A2, 0.032, 1.5, 1.5, 1000);
  pad(12.5, 5.5, NOTE.E3, 0.026, 1.5, 1.5, 1000);
  // 键盘四声嗒 + 记完冲击
  tick(14.5); tick(15.0); tick(15.5); tick(16.0);
  impact(16.6, 0.15);
  pluck(16.62, NOTE.A5, 0.05);
  pluck(16.7, NOTE.E5, 0.035);
  // 18s「2.1 秒。」卡：温暖持续
  pad(18.2, 2.8, NOTE.A3, 0.04, 0.8, 1.2, 1500);
  pad(18.25, 2.8, NOTE.C$4, 0.03, 0.9, 1.2, 1500);
  // 21s 统计：上行琶音（数据生长的感觉）；脉冲在终止和弦前停下，留一口气
  for (let i = 0; i < 8; i++) pulse(21 + i * 0.75, 0.06);
  const arp = [NOTE.A4, NOTE.C$5, NOTE.E5, NOTE.A5, NOTE.E5, NOTE.C$5, NOTE.A4, NOTE.E5];
  arp.forEach((fq, i) => pluck(21.3 + i * 0.35, fq, 0.036));
  pad(21, 3.8, NOTE.F$3, 0.03, 1.2, 1.2, 1100);
  // 24.9s「清清楚楚。」卡
  pad(24.9, 2.6, NOTE.A3, 0.038, 0.7, 1.2, 1400);
  pad(24.95, 2.6, NOTE.E4, 0.028, 0.9, 1.2, 1400);
  // 27.5s 落版：终止大和弦（Amaj9），一切归于安宁
  impact(27.9, 0.11);
  pad(27.8, 5.6, NOTE.A2, 0.05, 1.2, 2.8, 1600);
  pad(27.9, 5.5, NOTE.A3, 0.04, 1.4, 2.8, 1800);
  pad(28.0, 5.4, NOTE.C$4, 0.034, 1.6, 2.8, 1800);
  pad(28.1, 5.3, NOTE.E4, 0.03, 1.8, 2.8, 1800);
  pad(28.4, 5.0, NOTE.B4, 0.02, 2.2, 2.6, 2000);
  pluck(29.2, NOTE.A5, 0.028);

  const rendered = await ac.startRendering();
  await fetch('/audio', { method: 'POST', body: encodeWav(rendered) });
}

function encodeWav(buf) {
  const n = buf.length, ch = 2, sr = buf.sampleRate;
  const bytes = 44 + n * ch * 2;
  const ab = new ArrayBuffer(bytes), v = new DataView(ab);
  const wstr = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  wstr(0, 'RIFF'); v.setUint32(4, bytes - 8, true); wstr(8, 'WAVE'); wstr(12, 'fmt ');
  v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, ch, true);
  v.setUint32(24, sr, true); v.setUint32(28, sr * ch * 2, true); v.setUint16(32, ch * 2, true); v.setUint16(34, 16, true);
  wstr(36, 'data'); v.setUint32(40, n * ch * 2, true);
  const L = buf.getChannelData(0), R = buf.numberOfChannels > 1 ? buf.getChannelData(1) : L;
  let o = 44;
  for (let i = 0; i < n; i++) {
    v.setInt16(o, Math.max(-1, Math.min(1, L[i])) * 0x7FFF, true); o += 2;
    v.setInt16(o, Math.max(-1, Math.min(1, R[i])) * 0x7FFF, true); o += 2;
  }
  return ab;
}

/* ================= 导出 ================= */
let exporting = false;
window.startExport = async function () {
  if (exporting) return;
  exporting = true;
  console.log('export: start');
  await fetch('/reset', { method: 'POST' });
  for (let i = 0; i < TOTAL; i++) {
    drawFrame(i / FPS);
    const blob = await new Promise(r => cv.toBlob(r, 'image/png'));
    await fetch('/frame/' + String(i).padStart(4, '0'), { method: 'POST', body: blob });
    if (i % 60 === 0) { hud.textContent = '导出中 ' + i + ' / ' + TOTAL; console.log('export: frame ' + i); }
  }
  hud.textContent = '合成配乐…';
  try { await renderAudio(); } catch (e) { console.warn('audio skipped: ' + e); }
  await fetch('/done', { method: 'POST' });
  hud.textContent = '导出完成 ✓';
  console.log('export: done');
  exporting = false;
};

window.seek = function (t) {
  drawFrame(t);
  hud.textContent = 't = ' + t.toFixed(2) + ' s　（?t=秒 预览单帧 / ?export 导出全片）';
};

// 注意：不能用 img.decode()——本机预览浏览器里它的 Promise 可能永不落定
function waitImg(img) {
  return new Promise(resolve => {
    const ok = () => resolve(img.naturalWidth > 0);
    if (img.complete) return ok();
    img.onload = ok;
    img.onerror = () => resolve(false);
  });
}

(async function boot() {
  iconOk = await waitImg(iconImg);
  qrOk = await waitImg(qrImg);
  const q = new URLSearchParams(location.search);
  if (q.has('export')) startExport();
  else seek(parseFloat(q.get('t') || '0'));
})();
</script>
